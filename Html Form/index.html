<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register form</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Registration Form</legend>

            <label for="FName">First Name</label>
            <input type="text" maxlength="5" name="firstName" pattern="[A-Za-z]+" title="Enter 1 to 5 letters only. Numbers and special characters are not allowed." id="FName">
            <br>
            <label for="email">Email</label>
            <input type="email" id="email" name="Email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" required>
            <br>
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="Phone" pattern="^01[0125][0-9]{8}$"  maxlength="11">
            <br>
            <input type="file"  accept=".png,image/png">
            <br>
            <label for="course">Courses</label>
            <input list="courses" name="Course" id="course">
            <datalist id="courses">
                <option value="html"></option>
                <option value="css"></option>
                <option value="js"></option>
                <option value="react"></option>
            </datalist>
            <br>
            <input type="date" name="date" required>
            <br>
            <label for="comment">Comment</label>
            <input type="text" id="comment" mame="Comment" pattern="[A-Za-z]" required>
            <br>
            <label for="range">Range</label>
            <input type="range" min="100" max="200" value="100" name="Range" >
            <br>
            <label for="gender">Gender:</label>
            <br>
            <label for="male">Male</label>
            <input type="radio" name="Gender" id="male" checked>
            <label for="female">Female</label>
            <input type="radio" name="Gender" id="female" >
            <br>
            <label>Tracks</label>
            <br>
            <label for="ui">UI/UX</label>
            <input type="checkbox" name="ui_ux" id="ui">
            <br>
            <label for="front">Frontend</label>
            <input type="checkbox" name="frontend" id="front">
            <br>
            <label for="back">Backend</label>
            <input type="checkbox" name="backend" id="back">
            <br>
            <button type="submit">submit</button>
            <button type="reset">Reset</button>
        </fieldset>
        

    </form>
</body>
</html>
